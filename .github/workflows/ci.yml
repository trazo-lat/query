name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  GO_VERSION: "1.25"

jobs:
  checks:
    name: Build & checks
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Build
        run: go build ./...

      - name: Check gofmt
        run: |
          output=$(gofmt -l .)
          if [ -n "$output" ]; then
            echo "::error::Files not formatted with gofmt:"
            echo "$output"
            exit 1
          fi

      - name: Check go mod tidy
        run: |
          go mod tidy
          # Build paths list dynamically since go.sum may not exist (zero-dep lib)
          paths=(go.mod)
          if [ -f go.sum ]; then paths+=(go.sum); fi
          if ! git diff --exit-code "${paths[@]}"; then
            echo "::error::go.mod or go.sum is not tidy. Run 'go mod tidy' and commit."
            exit 1
          fi

      - name: Run golangci-lint
        # wasm/ is excluded — it uses syscall/js which can't be type-checked
        # outside of GOOS=js/GOARCH=wasm builds.
        run: golangci-lint run ./token/... ./ast/... ./parser/... ./validate/... ./eval/... ./examples/... .

  test:
    name: Unit tests
    runs-on: self-hosted
    needs: [checks]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Run tests
        run: |
          go test -race -count=1 \
            -coverprofile=coverage.out -covermode=atomic \
            -coverpkg=./token/...,./ast/...,./parser/...,./validate/...,./eval/...,./ \
            ./token/... ./ast/... ./parser/... ./validate/... ./eval/... .

      - name: Print coverage summary
        run: go tool cover -func=coverage.out | tail -1

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.out

  wasm:
    name: WASM build
    runs-on: self-hosted
    needs: [checks]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Build WASM
        run: |
          cd wasm
          GOOS=js GOARCH=wasm go build -o query.wasm .

      - name: Upload WASM artifact
        uses: actions/upload-artifact@v4
        with:
          name: query-wasm
          path: wasm/query.wasm
